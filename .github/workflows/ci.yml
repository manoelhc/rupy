name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
env:
  PYENV_ROOT: ~/.pyenv
jobs:
  install-deps:
    runs-on: self-hosted
    steps:
      - uses: manoelhc/debian-runner-setup-action@main
        with:
          packages: full
          sudo: true
  rust-build-and-test:
    needs: install-deps
    permissions:
      contents: read
    name: Rust Build and Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check Rust formatting
        run: cargo fmt -- --check

      - name: Run Clippy
        run: cargo clippy -- -D warnings -A clippy::useless-conversion

      - name: Build Rust project
        run: cargo build --release

      - name: Run Rust tests
        run: cargo test --release

  python-build-and-test:
    needs: install-deps
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    name: Python Build and Test
    runs-on: self-hosted
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        shell: bash -l {0}
        run: |
          if [[ -z "$(which pyenv)" ]]; then
            curl https://pyenv.run | bash
            export PYENV_ROOT="$HOME/.pyenv" >> ~/.profile
            export PATH="$PYENV_ROOT/bin:$PATH" >> ~/.profile
            eval "$(pyenv init - bash)" >> ~/.profile
          fi
          pyenv install ${{ matrix.python-version }} || true
          pyenv local ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install maturin
        shell: bash -l {0}
        run: pip3 install maturin

      - name: Build Python package
        shell: bash -l {0}
        run: maturin build --release

      - name: Install built wheel
        shell: bash -l {0}
        env:
          PYTHON_VERSION: "${{ matrix.python-version }}"
        run: |
          vpy="$(echo ${PYTHON_VERSION} | cut -d. -f1)$(echo ${PYTHON_VERSION} | cut -d. -f2)"
          pip3 install target/wheels/rupy_api*cp${vpy}*.whl

      - name: Test Python import
        shell: bash -l {0}
        run: python -c "from rupy import Rupy; print('Successfully imported Rupy')"

      - name: Run Python tests (if they exist)
        shell: bash -l {0}
        run: |
          if [ -d "tests" ]; then
            pip3 install pytest requests
            pytest tests/
          else
            echo "No Python tests found, skipping"
          fi
        continue-on-error: true
  build-draft:
    needs: install-deps
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == true
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Cache pyenv Python installation
        uses: actions/cache@v5
        with:
          path: ~/.pyenv/versions
          key: pyenv-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.python-version') }}

      - name: Set up Python via pyenv
        shell: bash -l {0}
        run: |
          pyenv install -s "${PYTHON_VERSION}"
          pyenv global "${PYTHON_VERSION}"

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install maturin
        shell: bash -l {0}
        run: pip3 install maturin

      - name: Build Python package
        shell: bash -l {0}
        run: maturin build --release

      - name: Install built wheel
        run: |
          vpy="$(python --version | cut -d' ' -f2 | cut -d. -f1,2 | tr -d '.')"
          pip3 install target/wheels/rupy_api*cp${vpy}*.whl
        shell: bash -l {0}

      - name: Test Python import
        shell: bash -l {0}
        run: python -c "from rupy import Rupy; print('Successfully imported Rupy')"

      - name: Run Python tests (if they exist)
        run: |
          if [ -d "tests" ]; then
            pip3 install pytest requests
            pytest tests/
          else
            echo "No Python tests found, skipping"
          fi
        shell: bash -l {0}
        continue-on-error: true
  lint:
    needs: install-deps
    permissions:
      contents: read
    name: Lint and Format Check
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Check Rust code formatting
        run: cargo fmt -- --check

      - name: Run Clippy linter
        run: cargo clippy --all-targets --all-features -- -D warnings -A clippy::useless-conversion

      - name: Set up Python ${{ matrix.python-version }}
        shell: bash -l {0}
        run: |
          source ~/.bashrc
          if [[ -z "$(which pyenv)" ]]; then
            curl https://pyenv.run | bash
          fi
          pyenv install "3.12.13" || true
          pyenv local "3.12.13"

      - name: Install Python linting tools
        shell: bash -l {0}
        run: |
          pip3 install ruff black mypy

      - name: Check Python code formatting with black
        shell: bash -l {0}
        run: |
          if [ -d "python" ]; then
            black --check python/
          fi
        continue-on-error: true

      - name: Lint Python code with ruff
        shell: bash -l {0}
        run: |
          if [ -d "python" ]; then
            ruff check python/
          fi
        continue-on-error: true
